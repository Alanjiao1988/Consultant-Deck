name: Apply QA Fixes

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/qa-negative-paths-2'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply audited QA fixes
        shell: bash
        run: |
          echo '' | base64 -d | gzip -d > /tmp/qa_fixes.patch
          git apply --check /tmp/qa_fixes.patch
          git apply /tmp/qa_fixes.patch
          rm -f .github/workflows/apply-qa-fixes.yml

      - name: Commit fixes to PR branch
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Harden QA negative paths and CLI behavior'
          git push origin HEAD:${{ github.head_ref }}
