name: Source Snapshot

on:
  pull_request:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: consultant-deck-source-snapshot
          path: |
            SKILL.md
            scripts/qa_pptx.py
            scripts/demo_generate_deck.py
            scripts/create_template.py
            tests
            .github/workflows/ci.yml
          if-no-files-found: error
