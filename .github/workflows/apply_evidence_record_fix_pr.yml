name: Apply evidence-record fix on PR

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/evidence-non-numeric-facts'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Execute audited patch embedded in source workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/apply_evidence_record_fix.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n\n          python -m py_compile"
          if marker not in source or end_marker not in source:
              raise SystemExit('Embedded patch markers not found')
          block = source.split(marker, 1)[1].split(end_marker, 1)[0]
          exec(compile(textwrap.dedent(block), '<embedded-evidence-fix>', 'exec'))
          PY
          python -m py_compile scripts/qa_pptx.py
          pytest tests/ -q

      - name: Commit implementation and remove temporary workflows
        shell: bash
        run: |
          rm .github/workflows/apply_evidence_record_fix.yml
          rm .github/workflows/apply_evidence_record_fix_pr.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/qa_pptx.py tests/test_evidence_records.py references/content-density.md .github/workflows/apply_evidence_record_fix.yml .github/workflows/apply_evidence_record_fix_pr.yml
          git commit -m "Support qualitative and malformed evidence records"
          git push origin HEAD:fix/evidence-non-numeric-facts
