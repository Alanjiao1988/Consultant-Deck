name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate template
        run: python scripts/create_template.py

      - name: Generate data-rich demo deck, evidence and briefs
        run: python scripts/demo_generate_deck.py

      - name: Run page-brief quantification QA
        run: |
          python scripts/qa_briefs.py examples/demo_ai_transformation.briefs.yaml \
            --facts examples/demo_ai_transformation.evidence.json \
            --fail-on-warning \
            --json

      - name: Generate PPTX QA report
        run: |
          python - <<'PY'
          from dataclasses import asdict
          from pathlib import Path
          import json
          from scripts.qa_pptx import run_qa

          findings = run_qa(
              Path("examples/demo_ai_transformation.pptx"),
              Path("examples/demo_ai_transformation.evidence.json"),
              Path("examples/demo_ai_transformation.briefs.yaml"),
          )
          Path("qa-findings.json").write_text(
              json.dumps([asdict(item) for item in findings], ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          print(Path("qa-findings.json").read_text(encoding="utf-8"))
          PY

      - name: Upload QA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consulting-deck-qa-report
          path: qa-findings.json
          if-no-files-found: error

      - name: Require zero PPTX QA findings
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          findings = json.loads(Path("qa-findings.json").read_text(encoding="utf-8"))
          if findings:
              for finding in findings:
                  print(finding)
              raise SystemExit(1)
          PY

      - name: Run tests
        run: pytest tests/ -q
