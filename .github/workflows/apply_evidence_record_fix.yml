name: Apply evidence-record robustness fix

on:
  push:
    branches: [fix/evidence-non-numeric-facts]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/evidence-non-numeric-facts
          fetch-depth: 0

      - name: Patch evidence loading and add regression tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          qa_path = Path('scripts/qa_pptx.py')
          text = qa_path.read_text(encoding='utf-8')

          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected one occurrence, found {count}: {old[:80]!r}')
              text = text.replace(old, new, 1)

          replace_once(
          '''def load_facts(path: Path | None) -> list[dict[str, Any]]:
              if path is None:
                  return []
              data = json.loads(path.read_text(encoding="utf-8"))
              records = []
              for section in ("facts", "calculations"):
                  for item in data.get(section, []):
                      try:
                          value = float(item.get("value"))
                      except (TypeError, ValueError):
                          continue
                      records.append({
                          "id": str(item.get("id", "UNKNOWN")),
                          "claim": str(item.get("claim", "")),
                          "value": value,
                          "unit": canonical_unit(item.get("unit", "plain")),
                          "source_type": str(item.get("source_type", "")),
                          "used_on_pages": {int(page) for page in item.get("used_on_pages", [])},
                      })
              return records
          ''',
          '''def _safe_used_on_pages(value: Any) -> set[int]:
              if value is None:
                  return set()
              values = value if isinstance(value, (list, tuple, set)) else [value]
              pages: set[int] = set()
              for item in values:
                  try:
                      page = int(item)
                  except (TypeError, ValueError):
                      continue
                  if page > 0:
                      pages.add(page)
              return pages


          def load_facts(path: Path | None) -> list[dict[str, Any]]:
              """Load numeric and qualitative evidence records without failing on bad rows.

              The legacy function name is retained for compatibility. Records with a numeric
              ``value`` participate in numeric consistency and density checks. Records with a
              missing or non-numeric value are retained as qualitative evidence, but never count
              toward numeric-density thresholds.
              """
              if path is None:
                  return []
              data = json.loads(path.read_text(encoding="utf-8"))
              if not isinstance(data, dict):
                  return []

              records: list[dict[str, Any]] = []
              for section in ("facts", "calculations"):
                  items = data.get(section, [])
                  if not isinstance(items, list):
                      continue
                  for index, item in enumerate(items, start=1):
                      if not isinstance(item, dict):
                          continue

                      raw_value = item.get("value")
                      value: float | None = None
                      is_numeric = False
                      if not isinstance(raw_value, bool):
                          try:
                              value = float(raw_value)
                              is_numeric = math.isfinite(value)
                          except (TypeError, ValueError):
                              value = None
                      if not is_numeric:
                          value = None

                      claim = str(item.get("claim", "") or "").strip()
                      explicit_text = item.get("text_value", item.get("qualitative_value"))
                      if explicit_text is None and raw_value is not None and not is_numeric:
                          explicit_text = raw_value
                      text_value = str(explicit_text or claim).strip()

                      records.append({
                          "id": str(item.get("id") or f"UNKNOWN-{section}-{index}"),
                          "claim": claim,
                          "value": value,
                          "text_value": text_value,
                          "unit": canonical_unit(item.get("unit", "plain")),
                          "source_type": str(item.get("source_type", "")),
                          "used_on_pages": _safe_used_on_pages(item.get("used_on_pages")),
                          "is_numeric": is_numeric,
                          "evidence_type": "numeric" if is_numeric else "qualitative",
                      })
              return records


          def numeric_facts(facts: list[dict[str, Any]]) -> list[dict[str, Any]]:
              return [fact for fact in facts if fact.get("is_numeric") and fact.get("value") is not None]
          ''')

          replace_once(
          '''def token_matches_fact(token: NumberToken, fact: dict[str, Any]) -> bool:
              return unit_compatible(token.unit, fact["unit"]) and values_equal(token.value, fact["value"])
          ''',
          '''def token_matches_fact(token: NumberToken, fact: dict[str, Any]) -> bool:
              if not fact.get("is_numeric") or fact.get("value") is None:
                  return False
              return unit_compatible(token.unit, fact["unit"]) and values_equal(token.value, fact["value"])
          ''')

          replace_once(
          '''def run_fact_consistency(prs: Presentation, facts: list[dict[str, Any]]) -> list[Finding]:
              if not facts:
                  return []
              findings: list[Finding] = []
          ''',
          '''def run_fact_consistency(prs: Presentation, facts: list[dict[str, Any]]) -> list[Finding]:
              facts = numeric_facts(facts)
              if not facts:
                  return []
              findings: list[Finding] = []
          ''')

          replace_once(
          '''def registered_fact_ids_on_slide(slide: Any, slide_num: int, facts: list[dict[str, Any]]) -> set[str]:
              title_shape = first_top_shape(slide)
          ''',
          '''def registered_fact_ids_on_slide(slide: Any, slide_num: int, facts: list[dict[str, Any]]) -> set[str]:
              facts = numeric_facts(facts)
              title_shape = first_top_shape(slide)
          ''')

          replace_once(
          '''def run_data_density(prs: Presentation, facts: list[dict[str, Any]], meta: dict[str, Any], briefs: dict[int, dict[str, Any]]) -> list[Finding]:
              analytical_pages = [page for page, brief in briefs.items() if not is_density_exempt(brief)]
              if not facts:
          ''',
          '''def run_data_density(prs: Presentation, facts: list[dict[str, Any]], meta: dict[str, Any], briefs: dict[int, dict[str, Any]]) -> list[Finding]:
              analytical_pages = [page for page, brief in briefs.items() if not is_density_exempt(brief)]
              numeric = numeric_facts(facts)
              if not numeric:
          ''')

          replace_once(
          '''        matched = registered_fact_ids_on_slide(slide, index, facts)
          ''',
          '''        matched = registered_fact_ids_on_slide(slide, index, numeric)
          ''')

          replace_once(
          '''    fact_count = len(load_facts(args.facts)) if args.facts is not None else 0
              brief_count = len(load_briefs(args.briefs)[1]) if args.briefs is not None else 0
          ''',
          '''    loaded_facts = load_facts(args.facts) if args.facts is not None else []
              fact_count = len(loaded_facts)
              numeric_count = len(numeric_facts(loaded_facts))
              qualitative_count = fact_count - numeric_count
              fact_status = (
                  f"{fact_count} (numeric={numeric_count}, qualitative={qualitative_count})"
                  if args.facts is not None else "not-supplied"
              )
              brief_count = len(load_briefs(args.briefs)[1]) if args.briefs is not None else 0
          ''')

          replace_once(
          '''        f"facts={fact_count if args.facts is not None else 'not-supplied'}; "
          ''',
          '''        f"facts={fact_status}; "
          ''')
          replace_once(
          '''        f"facts={fact_count if args.facts is not None else 'not-supplied'}; "
          ''',
          '''        f"facts={fact_status}; "
          ''')

          qa_path.write_text(text, encoding='utf-8')

          tests = r'''from pathlib import Path
          import json
          import sys

          import yaml
          from pptx import Presentation
          from pptx.util import Cm

          ROOT = Path(__file__).resolve().parents[1]
          if str(ROOT) not in sys.path:
              sys.path.insert(0, str(ROOT))

          from scripts.consulting_layouts import SLIDE_H, SLIDE_W, add_action_title, add_footer, cover_page
          from scripts.consulting_shapes import add_textbox
          from scripts.qa_pptx import load_facts, main as qa_main, numeric_facts, run_qa


          def make_deck(path: Path, body: str = "Savings reach 30% in the base case.") -> Path:
              prs = Presentation()
              prs.slide_width = Cm(SLIDE_W)
              prs.slide_height = Cm(SLIDE_H)
              cover = prs.slides.add_slide(prs.slide_layouts[6])
              cover_page(cover, "Evidence loader test", "Synthetic", "Test", "2026-07-10")
              slide = prs.slides.add_slide(prs.slide_layouts[6])
              add_action_title(slide, "Automation can reduce target-process cost by 30%")
              add_textbox(slide, body, 1.2, 3.2, 20, 1)
              add_footer(slide, 2, "Synthetic test source")
              prs.save(path)
              return path


          def write_briefs(path: Path, minimum: int = 1) -> Path:
              path.write_text(
                  yaml.safe_dump(
                      {
                          "content_density_target": "research-heavy",
                          "pages": [
                              {"page": 1, "page_role": "cover"},
                              {
                                  "page": 2,
                                  "page_role": "core_argument",
                                  "min_registered_numbers": minimum,
                              },
                          ],
                      },
                      sort_keys=False,
                  ),
                  encoding="utf-8",
              )
              return path


          def test_load_facts_preserves_qualitative_records_without_value(tmp_path):
              evidence = tmp_path / "evidence.json"
              evidence.write_text(
                  json.dumps(
                      {
                          "facts": [
                              {
                                  "id": "Q001",
                                  "claim": "Regulatory approval is required before production use",
                                  "source_type": "regulator",
                                  "used_on_pages": [2],
                              }
                          ],
                          "calculations": [],
                      }
                  ),
                  encoding="utf-8",
              )
              records = load_facts(evidence)
              assert len(records) == 1
              assert records[0]["evidence_type"] == "qualitative"
              assert records[0]["is_numeric"] is False
              assert records[0]["value"] is None
              assert records[0]["text_value"].startswith("Regulatory approval")
              assert numeric_facts(records) == []


          def test_malformed_records_and_pages_do_not_crash(tmp_path):
              evidence = tmp_path / "evidence.json"
              evidence.write_text(
                  json.dumps(
                      {
                          "facts": [
                              None,
                              "bad-row",
                              {
                                  "id": "Q002",
                                  "claim": "Named-vendor conclusion",
                                  "value": "Vendor A",
                                  "used_on_pages": ["2", "bad", None, -1],
                              },
                              {
                                  "id": "Q003",
                                  "claim": "Boolean is not a numeric fact",
                                  "value": True,
                                  "used_on_pages": "2",
                              },
                          ],
                          "calculations": {"not": "a-list"},
                      }
                  ),
                  encoding="utf-8",
              )
              records = load_facts(evidence)
              assert len(records) == 2
              assert all(record["evidence_type"] == "qualitative" for record in records)
              assert records[0]["used_on_pages"] == {2}
              assert records[1]["used_on_pages"] == {2}


          def test_qualitative_only_evidence_does_not_satisfy_numeric_density(tmp_path):
              deck = make_deck(tmp_path / "qualitative_only.pptx", "The design requires regulatory approval.")
              evidence = tmp_path / "evidence.json"
              evidence.write_text(
                  json.dumps(
                      {
                          "facts": [
                              {"id": "Q001", "claim": "Regulatory approval is required", "used_on_pages": [2]}
                          ],
                          "calculations": [],
                      }
                  ),
                  encoding="utf-8",
              )
              briefs = write_briefs(tmp_path / "briefs.yaml")
              findings = run_qa(deck, evidence, briefs)
              assert any(
                  item.severity == "error"
                  and item.check == "data_density"
                  and "No registered numeric facts" in item.message
                  for item in findings
              )


          def test_mixed_numeric_and_qualitative_evidence_preserves_numeric_qa(tmp_path):
              deck = make_deck(tmp_path / "mixed.pptx")
              evidence = tmp_path / "evidence.json"
              evidence.write_text(
                  json.dumps(
                      {
                          "facts": [
                              {"id": "Q001", "claim": "Regulatory approval is required", "used_on_pages": [2]},
                              {
                                  "id": "N001",
                                  "claim": "Base-case savings",
                                  "value": "30",
                                  "unit": "%",
                                  "used_on_pages": [2],
                              },
                          ],
                          "calculations": [],
                      }
                  ),
                  encoding="utf-8",
              )
              briefs = write_briefs(tmp_path / "briefs.yaml")
              findings = run_qa(deck, evidence, briefs)
              assert not any(item.check == "fact_consistency" and item.severity == "error" for item in findings)
              assert not any(item.check == "data_density" for item in findings)


          def test_cli_diagnostics_separate_numeric_and_qualitative_counts(tmp_path, capsys):
              deck = make_deck(tmp_path / "diagnostics.pptx")
              evidence = tmp_path / "evidence.json"
              evidence.write_text(
                  json.dumps(
                      {
                          "facts": [
                              {"id": "Q001", "claim": "Qualitative conclusion"},
                              {"id": "N001", "claim": "Savings", "value": 30, "unit": "%", "used_on_pages": [2]},
                          ],
                          "calculations": [],
                      }
                  ),
                  encoding="utf-8",
              )
              assert qa_main([str(deck), "--facts", str(evidence)]) == 0
              output = capsys.readouterr().out
              assert "facts=2 (numeric=1, qualitative=1)" in output
          '''
          Path('tests/test_evidence_records.py').write_text(tests, encoding='utf-8')

          density_path = Path('references/content-density.md')
          density = density_path.read_text(encoding='utf-8')
          marker = '7. Never fabricate or extrapolate unsupported numbers to increase density. Density pressure always strengthens Step 4 research; it never relaxes Evidence Discipline.\n'
          addition = marker + '''\n### Numeric and qualitative evidence records\n\n`evidence.json` may contain both numeric and qualitative records. Numeric records have a finite numeric `value` and may participate in fact-consistency and data-density checks. Qualitative records may omit `value`, use a text `value`, or use `text_value`/`qualitative_value`; they remain registered and traceable but never count toward numeric-density thresholds. Malformed rows and invalid `used_on_pages` entries must not crash QA.\n'''
          if addition not in density:
              if marker not in density:
                  raise SystemExit('Content-density insertion marker not found')
              density = density.replace(marker, addition, 1)
              density_path.write_text(density, encoding='utf-8')
          PY

          python -m py_compile scripts/qa_pptx.py
          pytest tests/ -q

      - name: Commit implementation and remove temporary workflow
        shell: bash
        run: |
          rm .github/workflows/apply_evidence_record_fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/qa_pptx.py tests/test_evidence_records.py references/content-density.md .github/workflows/apply_evidence_record_fix.yml
          git commit -m "Support qualitative and malformed evidence records"
          git push origin HEAD:fix/evidence-non-numeric-facts
